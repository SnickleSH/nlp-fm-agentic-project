# Discrimination levels: hard (4000) + extra-hard (1500). Budgeted, so no S4 needed — run first.
# --num-tasks 5: distinct puzzles matter where budget discriminates. N: hard=6, extra-hard=8.
# Run: poetry run python scripts/run_all.py --config configs/logic_final_main.yaml --num-tasks 5 --output results/logic_final.jsonl

experiments:
  # hard — 5x5, 4000
  - {architecture: level1,  domain: logic_puzzles, difficulty: hard, num_runs: 6,  thinking_token_budget: 4000}
  - {architecture: level2a, domain: logic_puzzles, difficulty: hard, num_runs: 6,  thinking_token_budget: 4000}
  - {architecture: level2b, domain: logic_puzzles, difficulty: hard, num_runs: 6,  max_critic_iterations: 2, thinking_token_budget: 4000}
  # - {architecture: level3, domain: logic_puzzles, difficulty: hard, num_runs: 6,  thinking_token_budget: 4000}   # after B3

  # extra-hard — 5x5, 1500
