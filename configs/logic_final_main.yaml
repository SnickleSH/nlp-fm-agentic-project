  - {architecture: level2a, domain: logic_puzzles, difficulty: hard, num_runs: 8,  thinking_token_budget: 1500}
  - {architecture: level2b, domain: logic_puzzles, difficulty: hard, num_runs: 8,  max_critic_iterations: 2, thinking_token_budget: 1500}
