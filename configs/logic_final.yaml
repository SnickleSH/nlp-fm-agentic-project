# Layout: 4 levels × 4 architectures. "unlimited" = no thinking_token_budget.
# difficulty maps to grid (easy=3x3, hard=5x5); the 4-level label is derived in preprocessing.
#
# N rationale:
#   - extra-hard (1500):        N=10  — tightest budget, noisiest, the key discrimination point.
#   - hard (4000):              N=8   — discriminating (L3 not saturated here) but cheaper.
#   - unlimited L1/L2A/L2B:     N=8   — saturation anchors.
#   - unlimited L3 (easy+medium): N=5 — the expensive corner; saturation anchor, low variance.
#
# GATE :The 4 level3 rows are COMMENTED OUT: do NOT run them until memory is integrated 
#       After it is merged: uncomment them and re-run this file (dedup-safe).
#
# Run:
#   poetry run python scripts/run_all.py --config configs/logic_final.yaml \
#     --num-tasks 5 --output results/logic_final.jsonl

experiments:
  # ===== easy level — 3x3, unlimited =====
  - {architecture: level1,  domain: logic_puzzles, difficulty: easy, num_runs: 8}
  - {architecture: level2a, domain: logic_puzzles, difficulty: easy, num_runs: 8}
  - {architecture: level2b, domain: logic_puzzles, difficulty: easy, num_runs: 8, max_critic_iterations: 2}
  # - {architecture: level3,  domain: logic_puzzles, difficulty: easy, num_runs: 5}

  # ===== medium level — 5x5, unlimited =====
  - {architecture: level1,  domain: logic_puzzles, difficulty: hard, num_runs: 8}
  - {architecture: level2a, domain: logic_puzzles, difficulty: hard, num_runs: 8}
  - {architecture: level2b, domain: logic_puzzles, difficulty: hard, num_runs: 8, max_critic_iterations: 2}
  # - {architecture: level3,  domain: logic_puzzles, difficulty: hard, num_runs: 5}

  # ===== hard level — 5x5, 4000 =====
  - {architecture: level1,  domain: logic_puzzles, difficulty: hard, num_runs: 8,  thinking_token_budget: 4000}
  - {architecture: level2a, domain: logic_puzzles, difficulty: hard, num_runs: 8,  thinking_token_budget: 4000}
  - {architecture: level2b, domain: logic_puzzles, difficulty: hard, num_runs: 8,  max_critic_iterations: 2, thinking_token_budget: 4000}
  # - {architecture: level3,  domain: logic_puzzles, difficulty: hard, num_runs: 8,  thinking_token_budget: 4000}

  # ===== extra-hard level — 5x5, 1500 =====
  - {architecture: level1,  domain: logic_puzzles, difficulty: hard, num_runs: 10, thinking_token_budget: 1500}
  - {architecture: level2a, domain: logic_puzzles, difficulty: hard, num_runs: 10, thinking_token_budget: 1500}
  - {architecture: level2b, domain: logic_puzzles, difficulty: hard, num_runs: 10, max_critic_iterations: 2, thinking_token_budget: 1500}
  # - {architecture: level3,  domain: logic_puzzles, difficulty: hard, num_runs: 10, thinking_token_budget: 1500}