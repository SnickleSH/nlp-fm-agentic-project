# Combined logic-puzzles sweep
#
# To run:
#   poetry run python scripts/run_all.py \
#     --config configs/full_sweep_logic_all.yaml \
#     --num-tasks 5 \
#     --output results/full_sweep.jsonl

experiments:
  # HARD (5x5)
  - architecture: level1
    domain: logic_puzzles
    difficulty: hard
    num_runs: 10
    thinking_token_budget: 1500

  - architecture: level2a
    domain: logic_puzzles
    difficulty: hard
    num_runs: 10
    thinking_token_budget: 1500

  - architecture: level2b
    domain: logic_puzzles
    difficulty: hard
    num_runs: 10
    max_critic_iterations: 2
    thinking_token_budget: 1500

  # --- anchors (4000, 8000): saturation anchors, N=8; L2B/8000 excluded ---
  - architecture: level1
    domain: logic_puzzles
    difficulty: hard
    num_runs: 8
    thinking_token_budget: 4000

  - architecture: level2a
    domain: logic_puzzles
    difficulty: hard
    num_runs: 8
    thinking_token_budget: 4000

  - architecture: level2b
    domain: logic_puzzles
    difficulty: hard
    num_runs: 8
    max_critic_iterations: 2
    thinking_token_budget: 4000

  - architecture: level1
    domain: logic_puzzles
    difficulty: hard
    num_runs: 8
    thinking_token_budget: 8000

  - architecture: level2a
    domain: logic_puzzles
    difficulty: hard
    num_runs: 8
    thinking_token_budget: 8000

  # ============ EASY (3x3) ============
  - architecture: level1
    domain: logic_puzzles
    difficulty: easy
    num_runs: 10
    thinking_token_budget: 1500

  - architecture: level2a
    domain: logic_puzzles
    difficulty: easy
    num_runs: 10
    thinking_token_budget: 1500

  - architecture: level2b
    domain: logic_puzzles
    difficulty: easy
    num_runs: 10
    max_critic_iterations: 2
    thinking_token_budget: 1500

  # --- anchors (4000, 8000), N=8; L2B/8000 excluded to mirror hard ---
  - architecture: level1
    domain: logic_puzzles
    difficulty: easy
    num_runs: 8
    thinking_token_budget: 4000

  - architecture: level2a
    domain: logic_puzzles
    difficulty: easy
    num_runs: 8
    thinking_token_budget: 4000

  - architecture: level2b
    domain: logic_puzzles
    difficulty: easy
    num_runs: 8
    max_critic_iterations: 2
    thinking_token_budget: 4000

  - architecture: level1
    domain: logic_puzzles
    difficulty: easy
    num_runs: 8
    thinking_token_budget: 8000

  - architecture: level2a
    domain: logic_puzzles
    difficulty: easy
    num_runs: 8
    thinking_token_budget: 8000